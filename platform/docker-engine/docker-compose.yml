services:
  engine:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - EDGE_REQUIRED=true
      - MQTT_HOST=mqtt
      - USERS_DB_FILE=/data/users.json
      - EDGES_DB_FILE=/data/edges.json
    volumes:
      - ./backend/data:/data
    depends_on:
      - mqtt
    restart: unless-stopped

  frontend:
    build: 
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - engine
    restart: unless-stopped
  
  # MQTT broker for trainer communication
  mqtt:
    image: eclipse-mosquitto:2
    container_name: mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
    restart: unless-stopped
